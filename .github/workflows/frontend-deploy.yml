name: Deploy FRONTEND

on:
  push:
    branches:
      - main
    paths:
      - '04-FRONTEND/**'
      - '.github/workflows/frontend-deploy.yml'

env:
  PROJECT_ID: nfl-model-471509
  REGION: us-central1
  FRONTEND_BUCKET: nfl-frontend-nfl-model-471509

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get deployed API URL
        id: api-url
        run: |
          url=$(gcloud run services describe nfl-backend-api \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '04-FRONTEND/package-lock.json'

      - name: Install dependencies
        working-directory: 04-FRONTEND
        run: npm ci

      - name: Generate types from live API
        working-directory: 04-FRONTEND
        run: npm run types:generate -- --url "${{ steps.api-url.outputs.url }}"
        continue-on-error: true  # Proceed if type generation fails (use cached types)

      - name: Build frontend
        working-directory: 04-FRONTEND
        env:
          VITE_API_BASE_URL: ${{ steps.api-url.outputs.url }}
        run: npm run build

      - name: Upload to Cloud Storage
        run: |
          gsutil -m rsync -r -d 04-FRONTEND/dist/ gs://${{ env.FRONTEND_BUCKET }}/

      - name: Set cache headers
        run: |
          # index.html: no cache (always fetch fresh)
          gsutil -m setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" \
            gs://${{ env.FRONTEND_BUCKET }}/index.html
          
          # assets/: immutable (Vite hashed filenames)
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            gs://${{ env.FRONTEND_BUCKET }}/assets/*

      - name: Invalidate CDN cache
        run: |
          # Invalidate index.html to force fresh download
          gcloud compute url-maps invalidate-cdn-cache nfl-frontend-load-balancer \
            --path="/index.html"

      - name: Smoke test
        run: |
          # Get the load balancer IP (this may be a placeholder; in production use a real domain)
          echo "Frontend deployed to gs://${{ env.FRONTEND_BUCKET }}/"
          echo "Verify via Google Cloud Console: https://console.cloud.google.com/storage/browser/${{ env.FRONTEND_BUCKET }}"

      - name: Send success notification
        if: success()
        run: |
          echo "✓ Frontend deployment successful"
          echo "Bucket: gs://${{ env.FRONTEND_BUCKET }}/"
          echo "Load Balancer: https://console.cloud.google.com/compute/loadbalancing/loadBalancers/details/global/nfl-frontend-load-balancer"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1
